<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Terminal</title>
  </head>
  <body>
    <div id="app">
      <!-- 左侧：工作目录侧栏 -->
      <aside id="sidebar">
        <div class="sb-title">工作目录</div>

        <div class="sb-block">
          <div class="sb-label">当前目录</div>
          <div id="current-dir" class="sb-path" title="">用户主目录 (~)</div>
        </div>

        <div class="sb-actions">
          <button id="pick-dir" class="sb-btn">选择文件夹…</button>
          <button id="set-default" class="sb-btn ghost">设为默认</button>
        </div>

        <div class="sb-block">
          <div class="sb-label">默认目录</div>
          <div id="default-dir" class="sb-path muted" title="">未设置（使用主目录）</div>
        </div>

        <div class="sb-block sb-grow">
          <div class="sb-label">最近使用</div>
          <div id="recent-list" class="sb-recent"></div>
        </div>

        <div class="sb-hint">新建会话将基于「当前目录」打开</div>

        <!-- AI 工具配置面板 -->
        <div id="ai-config-panel">
          <div class="sb-title">AI 配置</div>
          <div class="ai-tool-tabs">
            <label class="ai-tool-tab active" data-tool="codex">
              <input type="radio" name="ai-tool" value="codex" checked> Codex
            </label>
            <label class="ai-tool-tab" data-tool="claude">
              <input type="radio" name="ai-tool" value="claude"> Claude
            </label>
            <label class="ai-tool-tab" data-tool="mimo">
              <input type="radio" name="ai-tool" value="mimo"> MiMo
            </label>
          </div>
          <div class="ai-fields">
            <div class="ai-field">
              <label>Base URL</label>
              <input type="text" id="ai-base-url" placeholder="https://api.example.com/v1">
            </div>
            <div class="ai-field">
              <label>API Key</label>
              <input type="text" id="ai-api-key" placeholder="sk-...">
            </div>
            <div class="ai-field">
              <label>Model</label>
              <input type="text" id="ai-model" placeholder="gpt-5.5">
            </div>
          </div>
          <button id="ai-apply-btn" class="ai-apply-btn">应用</button>
          <div id="ai-config-status" class="ai-config-status"></div>
        </div>
      </aside>

      <!-- 右侧：主区域 -->
      <div id="main">
        <!-- 顶部标签栏 + 新建按钮 -->
        <div id="tabbar">
          <div id="tabs"></div>
          <div id="actions">
            <button class="new-btn kiro" data-kind="kiro" title="新建 Kiro 会话">
              <span class="dot"></span>+ Kiro
            </button>
            <button class="new-btn codex" data-kind="codex" title="新建 Codex 会话">
              <span class="dot"></span>+ Codex
            </button>
            <button class="new-btn claude" data-kind="claude" title="新建 Claude Code 会话">
              <span class="dot"></span>+ Claude Code
            </button>
            <button class="new-btn mimo" data-kind="mimo" title="新建 MiMo 会话">
              <span class="dot"></span>+ MiMo
            </button>
          </div>
        </div>
        <!-- 终端容器区 -->
        <div id="terminals"></div>
        <!-- 空状态提示 -->
        <div id="empty-hint">
          <div class="empty-inner">
            <h1>AI Terminal</h1>
            <p>点击右上角 <b>+ Kiro</b>、<b>+ Codex</b>、<b>+ Claude Code</b> 或 <b>+ MiMo</b> 新建一个终端会话</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
