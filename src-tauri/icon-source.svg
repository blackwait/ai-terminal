<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 外层圆角底渐变：紫(Kiro) -> 蓝(Codex) -->
    <linearGradient id="bg" x1="160" y1="120" x2="880" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="0.55" stop-color="#5B7CFA"/>
      <stop offset="1" stop-color="#3AA0E0"/>
    </linearGradient>
    <!-- 终端窗口面板渐变 -->
    <linearGradient id="panel" x1="220" y1="300" x2="804" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23252B"/>
      <stop offset="1" stop-color="#15171C"/>
    </linearGradient>
    <!-- 提示符光标渐变 -->
    <linearGradient id="caret" x1="360" y1="470" x2="470" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9AE6B4"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#0B1020" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 圆角渐变底（留出四周透明边距，符合 macOS 图标审美） -->
  <rect x="112" y="112" width="800" height="800" rx="188" fill="url(#bg)"/>
  <!-- 顶部高光，增加质感 -->
  <rect x="112" y="112" width="800" height="800" rx="188" fill="white" opacity="0.06"/>

  <!-- 终端窗口面板 -->
  <g filter="url(#soft)">
    <rect x="236" y="286" width="552" height="452" rx="46" fill="url(#panel)"/>
  </g>
  <!-- 窗口标题栏底线 -->
  <rect x="236" y="286" width="552" height="92" rx="46" fill="#2C2F36"/>
  <rect x="236" y="340" width="552" height="40" fill="#2C2F36"/>
  <!-- 红黄绿三色圆点 -->
  <circle cx="300" cy="332" r="17" fill="#FF5F57"/>
  <circle cx="356" cy="332" r="17" fill="#FEBC2E"/>
  <circle cx="412" cy="332" r="17" fill="#28C840"/>

  <!-- 提示符 chevron ">" -->
  <path d="M316 470 L408 540 L316 610" stroke="url(#caret)" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 输入光标块 -->
  <rect x="452" y="566" width="120" height="42" rx="12" fill="#CBD5E1"/>

  <!-- 模拟输出行 -->
  <rect x="316" y="654" width="356" height="26" rx="13" fill="#3B4250"/>
  <rect x="316" y="700" width="232" height="26" rx="13" fill="#323847"/>
</svg>
